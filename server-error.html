<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Something went wrong — Bank of America</title>
    <meta name="description" content="We're experiencing technical difficulties." />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./assets/styles.css" />
    <style>
      .error-page { min-height: 100vh; background: var(--gray-50); display: flex; align-items: center; justify-content: center; padding: 24px; }
      .error-box { max-width: 28rem; width: 100%; text-align: center; }
      .spinner { display: inline-block; width: 48px; height: 48px; border: 4px solid var(--brand-red); border-top-color: transparent; border-radius: 999px; animation: spin 0.8s linear infinite; margin-bottom: 24px; }
      .error-icon { width: 64px; height: 64px; border-radius: 999px; background: #fee2e2; color: var(--brand-red); display: grid; place-items: center; margin: 0 auto 24px; font-size: 2rem; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="error-page">
      <div class="error-box">
        <div id="spinner" class="spinner" aria-hidden="true"></div>
        <p id="loading-msg" class="muted">Processing your request...</p>

        <div id="error-content" hidden>
          <div class="error-icon" aria-hidden="true">!</div>
          <h1 class="h2-style mb-2">We're sorry</h1>
          <p class="muted mb-6">We're experiencing technical difficulties. Please try again later. If the problem persists, contact customer service.</p>
          <a href="./index.html" class="cta-outline" style="background: var(--brand-blue); color: var(--white); border-color: var(--brand-blue);">Return to Home</a>
        </div>
      </div>
    </div>
    <script>
      setTimeout(function() {
        document.getElementById('spinner').hidden = true;
        document.getElementById('loading-msg').hidden = true;
        document.getElementById('error-content').hidden = false;
      }, 2500);
    </script>
  </body>
</html>
